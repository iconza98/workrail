triggers:
  # Direct webhook trigger: POST /webhook/test-task {"goal": "your task description"}
  # Use for one-off tasks when you don't want to go through the queue.
  - id: test-task
    provider: generic
    workflowId: coding-task-workflow-agentic
    workspacePath: /Users/etienneb/git/personal/workrail
    goalTemplate: "{{$.goal}}"
    concurrencyMode: parallel
    branchStrategy: worktree
    baseBranch: main
    branchPrefix: "worktrain/"
    autoCommit: true
    autoOpenPR: true
    agentConfig:
      maxSessionMinutes: 60

  # MR review: fires when a PR is opened/updated via GitHub PR polling or webhook.
  # Dispatch manually: POST /webhook/mr-review {"pull_request": {"title": "PR #123: ...", "number": 123}}
  - id: mr-review
    provider: generic
    workflowId: mr-review-workflow-agentic
    workspacePath: /Users/etienneb/git/personal/workrail
    goalTemplate: "Review PR {{$.pull_request.number}}: {{$.pull_request.title}}"
    concurrencyMode: parallel
    branchStrategy: none
    autoCommit: false
    agentConfig:
      maxSessionMinutes: 30

  # Self-improvement queue: apply "worktrain:ready" label to any issue to queue it.
  # WorkTrain acts as EtienneBBeaulac. PRs are identifiable by [WT] prefix and
  # worktrain/ branch name. Token resolved from $WORKTRAIN_BOT_TOKEN env var.
  # Self-improvement queue: assign issues to worktrain-etienneb to queue them.
  # WorkTrain acts as EtienneBBeaulac. PRs get [WT] prefix and worktrain/ branch.
  - id: self-improvement
    provider: github_queue_poll
    workflowId: coding-task-workflow-agentic
    workspacePath: /Users/etienneb/git/personal/workrail
    queueType: assignee
    goalTemplate: "{{$.issue.title}}"
    branchStrategy: worktree
    baseBranch: main
    branchPrefix: "worktrain/"
    autoCommit: true
    autoOpenPR: true
    source:
      repo: EtienneBBeaulac/workrail
      token: $WORKTRAIN_BOT_TOKEN
      pollIntervalSeconds: 3600
    agentConfig:
      maxSessionMinutes: 120
      maxTurns: 60
      stuckAbortPolicy: abort
