name: Release

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ main ]

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  notify-ci-failure:
    name: Notify CI failure on main
    runs-on: ubuntu-latest
    # Fires when CI fails on a push to main -- release will be skipped, open an issue.
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    permissions:
      issues: write
    steps:
      - name: Open issue for CI failure blocking release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_RUN_URL: ${{ github.event.workflow_run.html_url }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${CI_SHA:0:7}"
          TITLE="CI failure on main blocking release (${SHORT_SHA})"

          EXISTING="$(gh issue list --repo "${REPO}" --state open --search "${TITLE}" --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING}" ]; then
            echo "Issue #${EXISTING} already open -- skipping"
            exit 0
          fi

          BODY="$(printf '## CI failure on main is blocking releases\n\nCI failed for commit [%s](https://github.com/%s/commit/%s) on `main`. The release workflow will not run until CI passes.\n\n**Failed CI run:** %s\n\nThis issue was opened automatically by the release workflow.' \
            "${SHORT_SHA}" "${REPO}" "${CI_SHA}" "${CI_RUN_URL}")"

          gh issue create \
            --repo "${REPO}" \
            --title "${TITLE}" \
            --label "bug" \
            --body "${BODY}"

  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    
    permissions:
      contents: write
      actions: read
      id-token: write
      issues: write
    
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: workrail

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/heads/main
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.14.0
          cache: 'npm'
          # Align with npm trusted publishing reference setup
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1.
      # corepack reads the packageManager field from package.json and activates
      # the correct npm version, reliably shadowing the bundled npm in PATH.
      - name: Activate npm (corepack reads packageManager from package.json)
        run: corepack enable npm && corepack prepare --activate

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download build artifact (dist/)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: dist
          path: dist

      - name: Verify dist manifest
        run: node scripts/dist-manifest.js --dist dist --verify dist/manifest.json

      - name: Capture pre-release tag
        run: |
          PRE_TAG="$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || true)"
          echo "PRE_RELEASE_TAG=$PRE_TAG" >> "$GITHUB_ENV"

      - name: Restore bin execute bit (upload-artifact strips file permissions)
        run: node -e "require('fs').chmodSync('dist/mcp-server.js',0o755)"

      - name: Verify build artifacts
        run: |
          echo "Checking build artifacts..."
          ls -la dist/
          test -f dist/mcp-server.js || (echo "Missing dist/mcp-server.js" && exit 1)
          test -f dist/cli.js || (echo "Missing dist/cli.js" && exit 1)
          test -x dist/mcp-server.js || (echo "dist/mcp-server.js is not executable after chmod -- publish aborted" && exit 1)
          echo "Build artifacts verified."

      - name: Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          WORKRAIL_ALLOW_MAJOR_RELEASE: ${{ vars.WORKRAIL_ALLOW_MAJOR_RELEASE }}
        run: |
          set -euo pipefail

          # Configure git remote to use the app token for push authentication.
          # @semantic-release/git pushes using the remote URL; setting it here ensures
          # the app token (which has bypass permission) is used, not GITHUB_TOKEN.
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Ensure we use the corepack-activated npm (OIDC requires npm >= 11.5.1).
          # npx prepends ./node_modules/.bin to PATH, which can shadow the corepack
          # shim with a bundled npm package version that does not support trusted publishing.
          export PATH="$(echo "$PATH" | tr ':' '\n' | awk '!/\/node_modules\/\.bin/' | paste -sd ':' -)"
          hash -r

          # Avoid npx so PATH is not implicitly modified.
          node ./node_modules/semantic-release/bin/semantic-release.js

      - name: Open version-bump PR
        if: success()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          NEW_VERSION="$(node -p "require('./package.json').version")"
          BRANCH="chore/release-${NEW_VERSION}"

          # Only open a PR if package.json was actually changed by prepareCmd
          if git diff --quiet package.json; then
            echo "No version bump to commit -- skipping PR."
            exit 0
          fi

          # Idempotency: skip if branch already exists (workflow rerun)
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists -- skipping PR creation."
            exit 0
          fi

          # Update package-lock.json to match the new version
          npm install --package-lock-only --ignore-scripts 2>/dev/null || true

          git config user.name  "workrail-release-bot[bot]"
          git config user.email "workrail-release-bot[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add package.json package-lock.json
          git commit --no-verify -m "chore(release): ${NEW_VERSION} [skip ci]"
          git push origin "${BRANCH}"

          PR_URL="$(gh pr create \
            --title "chore(release): ${NEW_VERSION} [skip ci]" \
            --body "Automated version bump after publishing v${NEW_VERSION} to npm." \
            --base main \
            --head "${BRANCH}")"

          # Admin-merge immediately -- this is a mechanical version number change,
          # no code risk, no need to wait for CI on a trivial package.json edit.
          gh pr merge "${BRANCH}" --squash --admin

      - name: Cleanup tag on failed publish
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          POST_TAG="$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || true)"

          # Only clean up if a new tag was created during this run.
          if [ -z "${POST_TAG}" ] || [ "${POST_TAG}" = "${PRE_RELEASE_TAG:-}" ]; then
            echo "RELEASE_TAG_CLEANUP_STATUS=none" >> "$GITHUB_ENV"
            exit 0
          fi

          TAG_SHA="$(git rev-list -n 1 "${POST_TAG}")"
          if [ "${TAG_SHA}" != "${CI_SHA}" ]; then
            echo "Refusing to delete ${POST_TAG}: tag sha ${TAG_SHA} != run sha ${CI_SHA}"
            exit 1
          fi

          VERSION="${POST_TAG#v}"

          # If npm already has this version, keep the tag (avoid flip-flopping).
          if npm view "@exaudeus/workrail@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} exists on npm; keeping tag ${POST_TAG}"
            echo "RELEASE_TAG_CLEANUP_STATUS=kept_published" >> "$GITHUB_ENV"
            echo "RELEASE_TAG_CLEANUP_TAG=${POST_TAG}" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Deleting tag ${POST_TAG} (${TAG_SHA}) from origin"
          git push origin ":refs/tags/${POST_TAG}"

          # Delete GitHub Release if it exists (ignore if not found).
          gh release delete "${POST_TAG}" -y || true

          echo "RELEASE_TAG_CLEANUP_STATUS=deleted" >> "$GITHUB_ENV"
          echo "RELEASE_TAG_CLEANUP_TAG=${POST_TAG}" >> "$GITHUB_ENV"

      - name: Open issue on release failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_RUN_URL: ${{ github.event.workflow_run.html_url }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${CI_SHA:0:7}"
          TITLE="Release failed for ${SHORT_SHA}"

          # Avoid duplicate issues: search for an open issue with the same title.
          EXISTING="$(gh issue list --repo "${REPO}" --state open --search "${TITLE}" --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING}" ]; then
            echo "Issue #${EXISTING} already open for this failure -- skipping"
            exit 0
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="$(printf '## Release failure\n\nThe release workflow failed for commit [%s](https://github.com/%s/commit/%s).\n\n**CI run:** %s\n**Release run:** %s\n\nThis issue was opened automatically by the release workflow.' \
            "${SHORT_SHA}" "${REPO}" "${CI_SHA}" "${CI_RUN_URL}" "${RUN_URL}")"

          gh issue create \
            --repo "${REPO}" \
            --title "${TITLE}" \
            --label "bug" \
            --body "${BODY}"

      - name: Release summary
        if: always()
        env:
          CI_RUN_URL: ${{ github.event.workflow_run.html_url }}
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_TAG_CLEANUP_STATUS: ${{ env.RELEASE_TAG_CLEANUP_STATUS }}
          RELEASE_TAG_CLEANUP_TAG: ${{ env.RELEASE_TAG_CLEANUP_TAG }}
        run: |
          POST_TAG="$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || true)"
          MANIFEST_SHA="$(sha256sum dist/manifest.json | awk '{print $1}')"

          if [ "${JOB_STATUS}" = "failure" ]; then
            if [ "${RELEASE_TAG_CLEANUP_STATUS:-}" = "deleted" ]; then
              OUTCOME_LINE="Failed (deleted ${RELEASE_TAG_CLEANUP_TAG}; will retry next run)"
              echo "::error title=Release outcome::Failed; deleted ${RELEASE_TAG_CLEANUP_TAG} to allow retry"
            elif [ "${RELEASE_TAG_CLEANUP_STATUS:-}" = "kept_published" ]; then
              OUTCOME_LINE="Failed (kept ${RELEASE_TAG_CLEANUP_TAG}; version already on npm)"
              echo "::error title=Release outcome::Failed; kept ${RELEASE_TAG_CLEANUP_TAG} (version already on npm)"
            else
              OUTCOME_LINE="Failed"
              echo "::error title=Release outcome::Failed"
            fi
          else
            if [ -n "$POST_TAG" ] && [ "$POST_TAG" != "${PRE_RELEASE_TAG:-}" ]; then
              echo "::notice title=Release outcome::Released ${POST_TAG}"
              OUTCOME_LINE="Released ${POST_TAG}"
              TAG_LINE="- Tag: ${POST_TAG}"
              RELEASE_LINE="- GitHub Release: https://github.com/${REPO}/releases/tag/${POST_TAG}"
            else
              echo "::notice title=Release outcome::No release (no version bump)"
              OUTCOME_LINE="No release (no version bump)"
              TAG_LINE="- Tag: (no release created)"
              RELEASE_LINE=""
            fi
          fi

          TAG_LINE="${TAG_LINE:-}";
          RELEASE_LINE="${RELEASE_LINE:-}";

          {
            echo "## Release Summary"
            echo
            echo "- Outcome: ${OUTCOME_LINE}"
            echo "- CI run: ${CI_RUN_URL} (run_id=${CI_RUN_ID})"
            echo "- Commit: ${CI_SHA}"
            echo "- dist manifest sha256: ${MANIFEST_SHA}"
            if [ -n "${TAG_LINE}" ]; then
              echo "${TAG_LINE}"
            fi
            if [ -n "${RELEASE_LINE}" ]; then
              echo "${RELEASE_LINE}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
